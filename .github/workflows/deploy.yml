name: Deploy portfolio to GitHub Pages

# Runs automatically on every push to main, or manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions needed for the official Pages deployment action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time; don't cancel a run in progress.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publishes the whole repo (index.html, CV, og-image.png, ...)
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
